<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jackson Bahía Cia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--rojo:#C8102E;--dorado:#F0A500;--crema:#FDF6EC;--oscuro:#1A0A00;--gris:#7A6A5A;--verde:#2ecc71;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--oscuro);color:var(--crema);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
    .bg-slideshow{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .bg-slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 2s ease-in-out;filter:brightness(0.35) saturate(0.8) sepia(0.3);}
    .bg-slide.active{opacity:1;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse at 20% 20%,rgba(200,16,46,0.28) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(240,165,0,0.18) 0%,transparent 60%),linear-gradient(180deg,rgba(26,8,0,0.78) 0%,rgba(26,8,0,0.6) 50%,rgba(26,8,0,0.88) 100%);pointer-events:none;z-index:1;}
    
    
    .note{position:fixed;opacity:0.12;animation:float linear infinite;pointer-events:none;z-index:2;color:var(--dorado);text-shadow:0 0 8px rgba(240,165,0,0.4);}
    @keyframes float{from{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:0.06}90%{opacity:0.06}to{transform:translateY(-100px) rotate(360deg);opacity:0}}
    .container{max-width:480px;margin:0 auto;padding:40px 20px 60px;position:relative;z-index:2;}
    /* Header */
    .header{text-align:center;margin-bottom:32px;animation:fadeDown 0.8s ease both;}
    .logo-img{width:130px;height:130px;border-radius:50%;object-fit:cover;border:3px solid transparent;background:linear-gradient(var(--oscuro),var(--oscuro)) padding-box,linear-gradient(135deg,var(--rojo),var(--dorado)) border-box;margin:0 auto 14px;display:block;filter:drop-shadow(0 0 20px rgba(240,165,0,0.35));}
    .brand-name{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;background:linear-gradient(135deg,#fff 30%,var(--dorado));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
    .tagline{color:var(--gris);font-size:0.82rem;margin-top:6px;letter-spacing:0.5px;}
    .divider{width:40px;height:2px;background:linear-gradient(90deg,var(--rojo),var(--dorado));margin:12px auto 0;border-radius:2px;}
    /* Sections */
    .section-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--dorado);margin:28px 0 12px;display:flex;align-items:center;gap:8px;}
    .section-title::after{content:'';flex:1;height:1px;background:rgba(240,165,0,0.2);}
    /* Cards */
    .course-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform 0.15s,background 0.2s,border-color 0.2s;animation:fadeUp 0.6s ease both;}
    .course-card:hover{transform:translateX(4px);background:rgba(255,255,255,0.07);border-color:rgba(240,165,0,0.25);}
    .card-icon{font-size:1.4rem;width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .card-body{flex:1;}
    .card-title{font-size:0.9rem;font-weight:500;margin-bottom:3px;}
    .card-meta{font-size:0.75rem;color:var(--gris);}
    .card-price{font-family:'Playfair Display',serif;font-size:0.95rem;color:var(--dorado);white-space:nowrap;text-align:right;}
    .card-price small{display:block;font-family:'DM Sans',sans-serif;font-size:0.65rem;color:var(--gris);font-weight:300;}
    /* Niveles grid */
    .niveles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
    .nivel-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:transform 0.15s,border-color 0.2s;}
    .nivel-card:hover{transform:translateY(-3px);border-color:rgba(240,165,0,0.3);}
    .nivel-num{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--dorado);line-height:1;}
    .nivel-label{font-size:0.75rem;color:var(--gris);margin:4px 0;}
    .nivel-info{font-size:0.7rem;color:var(--crema);opacity:0.7;}
    .nivel-price{font-size:0.85rem;color:var(--dorado);font-weight:500;margin-top:6px;}
    /* Membresía */
    .membresia-completa{background:linear-gradient(135deg,rgba(200,16,46,0.2),rgba(240,165,0,0.1));border:1px solid rgba(240,165,0,0.35);border-radius:16px;padding:20px;text-align:center;margin-bottom:10px;position:relative;overflow:hidden;animation:fadeUp 0.6s ease both;}
    .membresia-completa::before{content:'⭐ ACCESO TOTAL ⭐';position:absolute;top:0;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,var(--rojo),var(--dorado));color:white;font-size:0.58rem;font-weight:600;letter-spacing:2px;padding:3px 16px;border-radius:0 0 8px 8px;white-space:nowrap;}
    .membresia-completa h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-top:12px;margin-bottom:4px;}
    .membresia-completa p{font-size:0.78rem;color:var(--gris);margin-bottom:10px;}
    .membresia-price{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dorado);}
    .membresia-price span{font-size:0.85rem;color:var(--gris);font-family:'DM Sans',sans-serif;}
    .btn-membresia{display:block;width:100%;margin-top:12px;padding:13px;background:linear-gradient(135deg,var(--rojo),#9B0020);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
    .btn-membresia:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,16,46,0.4);}
    .combo-banner{background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.25);border-radius:12px;padding:12px 16px;font-size:0.78rem;color:#7effc1;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
    .combo-banner strong{color:var(--verde);}
    /* Vivo */
    .vivo-card{background:rgba(255,255,255,0.04);border:1px dashed rgba(240,165,0,0.3);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:background 0.2s;margin-bottom:10px;}
    .vivo-card:hover{background:rgba(255,255,255,0.07);}
    .vivo-dot{width:10px;height:10px;border-radius:50%;background:var(--rojo);box-shadow:0 0 8px var(--rojo);animation:pulse 1.5s infinite;flex-shrink:0;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
    /* Social */
    .social-section{display:flex;gap:10px;margin-top:28px;margin-bottom:10px;}
    .social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;text-decoration:none;font-size:0.88rem;font-weight:500;transition:transform 0.15s;}
    .social-btn:hover{transform:translateY(-2px);}
    .btn-whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);color:white;}
    .btn-instagram{background:linear-gradient(135deg,#E1306C,#833AB4,#F77737);color:white;}
    /* Donaciones */
    .donacion-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;text-align:center;margin-top:10px;}
    .donacion-card h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--dorado);margin-bottom:6px;}
    .donacion-card p{font-size:0.78rem;color:var(--gris);margin-bottom:14px;}
    .qr-img{width:180px;height:180px;border-radius:12px;object-fit:cover;border:2px solid rgba(240,165,0,0.3);}
    /* Modal pago */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.visible{display:flex;}
    .modal{background:#1a0800;border:1px solid rgba(240,165,0,0.25);border-radius:20px;padding:28px 22px;max-width:400px;width:100%;text-align:center;animation:scaleIn 0.3s ease both;}
    .modal-icon{font-size:2.5rem;margin-bottom:10px;}
    .modal h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:6px;}
    .modal p{color:var(--gris);font-size:0.82rem;line-height:1.6;margin-bottom:12px;}
    .modal-price{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dorado);margin-bottom:16px;}
    .modal-price span{font-size:0.85rem;color:var(--gris);font-family:'DM Sans',sans-serif;}
    .btn-pagar{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#3B5BDB,#2045C4);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;cursor:pointer;margin-bottom:10px;transition:transform 0.15s;}
    .btn-pagar:hover{transform:translateY(-2px);}
    .btn-cerrar{background:none;border:none;color:var(--gris);font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;padding:8px;}
    /* Modal login */
    .login-modal{background:#1a0800;border:1px solid rgba(240,165,0,0.25);border-radius:20px;padding:28px 22px;max-width:400px;width:100%;animation:scaleIn 0.3s ease both;}
    .login-modal h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:6px;text-align:center;}
    .login-modal p{color:var(--gris);font-size:0.82rem;text-align:center;margin-bottom:20px;}
    .input-group{margin-bottom:14px;text-align:left;}
    .input-group label{display:block;font-size:0.78rem;color:var(--gris);margin-bottom:5px;}
    .input-group input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:var(--crema);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:11px 14px;outline:none;transition:border-color 0.2s;}
    .input-group input:focus{border-color:rgba(240,165,0,0.5);}
    .btn-login{display:block;width:100%;padding:13px;background:linear-gradient(135deg,var(--rojo),#9B0020);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;margin-top:6px;transition:transform 0.15s;}
    .btn-login:hover{transform:translateY(-2px);}
    .btn-register-link{background:none;border:none;color:var(--dorado);font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;margin-top:12px;display:block;width:100%;text-align:center;}
    .error-msg{background:rgba(200,16,46,0.15);border:1px solid rgba(200,16,46,0.3);border-radius:8px;color:#ff8888;font-size:0.78rem;padding:8px 12px;margin-bottom:12px;display:none;}
    .error-msg.visible{display:block;}
    .success-msg{background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.3);border-radius:8px;color:#7effc1;font-size:0.78rem;padding:8px 12px;margin-bottom:12px;display:none;}
    .success-msg.visible{display:block;}
    /* Curso page */
    .curso-page{display:none;min-height:100vh;}
    .curso-page.visible{display:block;}
    .curso-header{background:linear-gradient(135deg,rgba(200,16,46,0.3),rgba(240,165,0,0.15));border:1px solid rgba(240,165,0,0.2);border-radius:16px;padding:20px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden;min-height:120px;}.curso-header-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.18;filter:brightness(0.7);border-radius:16px;z-index:0;}.curso-header>*:not(.curso-header-bg){position:relative;z-index:1;}
    .curso-header h1{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--dorado);margin-bottom:4px;}
    .curso-header p{font-size:0.8rem;color:var(--gris);}
    .vencimiento-badge{display:inline-block;margin-top:8px;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:500;}
    .vencimiento-ok{background:rgba(46,204,113,0.2);border:1px solid rgba(46,204,113,0.4);color:#7effc1;}
    .vencimiento-warn{background:rgba(240,165,0,0.2);border:1px solid rgba(240,165,0,0.4);color:var(--dorado);}
    .vencimiento-exp{background:rgba(200,16,46,0.2);border:1px solid rgba(200,16,46,0.4);color:#ff8888;}
    .video-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden;margin-bottom:12px;}
    .video-thumb{width:100%;aspect-ratio:16/9;background:#000;display:flex;align-items:center;justify-content:center;font-size:3rem;cursor:pointer;}
    .video-info{padding:12px 16px;}
    .video-title{font-size:0.9rem;font-weight:500;margin-bottom:4px;}
    .video-meta{font-size:0.75rem;color:var(--gris);}
    .btn-logout{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--gris);font-family:'DM Sans',sans-serif;font-size:0.78rem;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
    .btn-logout:hover{border-color:var(--rojo);color:var(--rojo);}
    /* Admin */
    .admin-toggle{text-align:center;margin:24px 0 12px;}
    .admin-toggle button{background:none;border:1px solid rgba(255,255,255,0.12);color:var(--gris);font-family:'DM Sans',sans-serif;font-size:0.75rem;padding:7px 16px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
    .admin-toggle button:hover{border-color:var(--dorado);color:var(--dorado);}
    .admin-panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin-bottom:24px;display:none;}
    .admin-panel.visible{display:block;}
    .admin-title{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:14px;color:var(--dorado);}
    .admin-tabs{display:flex;gap:8px;margin-bottom:16px;}
    .admin-tab{flex:1;padding:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--gris);font-family:'DM Sans',sans-serif;font-size:0.78rem;cursor:pointer;text-align:center;transition:all 0.2s;}
    .admin-tab.active{background:rgba(240,165,0,0.15);border-color:rgba(240,165,0,0.3);color:var(--dorado);}
    .admin-section{display:none;}
    .admin-section.visible{display:block;}
    .member-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.83rem;}
    .member-row:last-of-type{border-bottom:none;}
    .member-name{color:var(--crema);font-weight:500;}
    .member-info{font-size:0.7rem;color:var(--gris);}
    .toggle-switch{position:relative;width:44px;height:24px;}
    .toggle-switch input{display:none;}
    .slider{position:absolute;inset:0;background:rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;transition:0.3s;}
    .slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:0.3s;}
    .toggle-switch input:checked+.slider{background:linear-gradient(90deg,var(--rojo),var(--dorado));}
    .toggle-switch input:checked+.slider::before{transform:translateX(20px);}
    .admin-form input,.admin-form select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--crema);font-family:'DM Sans',sans-serif;font-size:0.82rem;padding:8px 12px;outline:none;margin-bottom:8px;}
    .admin-form select option{background:#1a0800;}
    .admin-form button{background:linear-gradient(135deg,var(--rojo),#9B0020);border:none;border-radius:8px;color:white;font-family:'DM Sans',sans-serif;font-size:0.82rem;padding:10px 16px;cursor:pointer;width:100%;}
    .footer{text-align:center;color:var(--gris);font-size:0.72rem;opacity:0.5;margin-top:20px;}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,var(--rojo),#9B0020);color:white;padding:12px 24px;border-radius:40px;font-size:0.83rem;transition:transform 0.4s ease;z-index:200;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
  
    /* ===== SOBRE MI ===== */
    .sobre-mi{background:linear-gradient(135deg,rgba(200,16,46,0.12),rgba(240,165,0,0.06));border:1px solid rgba(240,165,0,0.2);border-radius:16px;padding:20px;margin-bottom:10px;display:flex;gap:16px;align-items:center;animation:fadeUp 0.6s ease both;}
    .sobre-mi-foto{width:90px;height:90px;border-radius:50%;object-fit:cover;flex-shrink:0;border:3px solid transparent;background:linear-gradient(var(--oscuro),var(--oscuro)) padding-box,linear-gradient(135deg,var(--rojo),var(--dorado)) border-box;}
    .sobre-mi-texto h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--dorado);margin-bottom:4px;}
    .sobre-mi-texto p{font-size:0.78rem;color:var(--gris);line-height:1.6;}
    .sobre-mi-stats{display:flex;gap:12px;margin-top:10px;}
    .stat{text-align:center;}
    .stat-num{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--dorado);font-weight:700;line-height:1;}
    .stat-label{font-size:0.62rem;color:var(--gris);margin-top:2px;}

    /* ===== TESTIMONIOS ===== */
    .testimonios-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
    .testimonio{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 16px;animation:fadeUp 0.6s ease both;position:relative;}
    .testimonio::before{content:'"';font-family:'Playfair Display',serif;font-size:3rem;color:var(--dorado);opacity:0.3;position:absolute;top:-4px;left:12px;line-height:1;}
    .testimonio-texto{font-size:0.82rem;color:var(--crema);line-height:1.6;margin-bottom:10px;padding-left:8px;}
    .testimonio-autor{display:flex;align-items:center;gap:10px;}
    .testimonio-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--rojo),var(--dorado));display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
    .testimonio-nombre{font-size:0.8rem;font-weight:500;color:var(--crema);}
    .testimonio-curso{font-size:0.7rem;color:var(--gris);}
    .estrellas{color:var(--dorado);font-size:0.75rem;margin-bottom:2px;}

    /* ===== CONTADOR ===== */
    .contador-section{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
    .contador-card{background:linear-gradient(135deg,rgba(200,16,46,0.15),rgba(240,165,0,0.08));border:1px solid rgba(240,165,0,0.2);border-radius:14px;padding:16px 10px;text-align:center;animation:fadeUp 0.6s ease both;}
    .contador-num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--dorado);line-height:1;}
    .contador-label{font-size:0.65rem;color:var(--gris);margin-top:4px;line-height:1.3;}

    /* ===== FAQ ===== */
    .faq-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;margin-bottom:8px;overflow:hidden;animation:fadeUp 0.6s ease both;}
    .faq-pregunta{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:0.86rem;font-weight:500;transition:background 0.2s;}
    .faq-pregunta:hover{background:rgba(255,255,255,0.04);}
    .faq-chevron{color:var(--dorado);font-size:0.9rem;transition:transform 0.3s;flex-shrink:0;}
    .faq-respuesta{max-height:0;overflow:hidden;transition:max-height 0.4s ease,padding 0.3s;}
    .faq-respuesta p{padding:0 16px 14px;font-size:0.8rem;color:var(--gris);line-height:1.6;}
    .faq-item.open .faq-chevron{transform:rotate(180deg);}
    .faq-item.open .faq-respuesta{max-height:200px;}

    /* ===== VENCIMIENTO BADGE en cards ===== */
    .venc-tag{font-size:0.62rem;color:rgba(240,165,0,0.7);display:block;margin-top:2px;}

    /* ===== WHATSAPP FLOTANTE ===== */
    .whatsapp-float{position:fixed;bottom:24px;right:20px;width:54px;height:54px;background:linear-gradient(135deg,#25D366,#128C7E);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);z-index:150;cursor:pointer;animation:wabounce 2s infinite;text-decoration:none;}
    .whatsapp-float svg{width:28px;height:28px;fill:white;}
    @keyframes wabounce{0%,100%{transform:scale(1);box-shadow:0 4px 20px rgba(37,211,102,0.4);}50%{transform:scale(1.08);box-shadow:0 6px 28px rgba(37,211,102,0.6);}}
    .whatsapp-tooltip{position:absolute;right:62px;background:#1a0800;border:1px solid rgba(37,211,102,0.3);color:var(--crema);font-size:0.72rem;padding:6px 10px;border-radius:8px;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none;}
    .whatsapp-float:hover .whatsapp-tooltip{opacity:1;}

  
    /* ===== MÓDULO BOX ===== */
    .modulo-box{background:rgba(255,255,255,0.03);border:1px solid rgba(240,165,0,0.25);border-radius:16px;margin-bottom:14px;overflow:hidden;animation:fadeUp 0.6s ease both;}
    .modulo-header{display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer;transition:background 0.2s;gap:12px;}
    .modulo-header:hover{background:rgba(255,255,255,0.04);}
    .modulo-header-left{display:flex;align-items:center;gap:12px;flex:1;}
    .modulo-icon{font-size:1.6rem;width:44px;height:44px;background:linear-gradient(135deg,rgba(200,16,46,0.2),rgba(240,165,0,0.1));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .modulo-titulo{font-size:0.92rem;font-weight:500;color:var(--crema);margin-bottom:2px;}
    .modulo-sub{font-size:0.72rem;color:var(--gris);}
    .modulo-chevron{color:var(--dorado);font-size:0.9rem;transition:transform 0.3s;flex-shrink:0;}
    .modulo-chevron.open{transform:rotate(180deg);}
    .modulo-contenido{padding:0 14px 14px;display:none;}
    .modulo-contenido.open{display:block;}

  </style>
</head>
