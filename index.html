            text-align: center; margin-bottom: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);

        .nivel-row:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--dorado); transform: translateY(-2px); }

        .social-links a { color: white; text-decoration: none; font-weight: bold; padding: 10px 20px; border: 1px solid var(--dorado); border-radius: 50px; font-size: 0.9rem; transition: 0.3s; }
        .social-links a:hover { background: var(--dorado); color: black; }

        /* MODAL REPRODUCTOR */

        .modal-content { width: 95%; max-width: 900px; }
        .v-cont { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 15px; overflow: hidden; }
        .v-cont iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
