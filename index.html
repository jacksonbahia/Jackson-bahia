<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jackson Bahía Cia | Academia de Bachata</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root { --dorado: #D4AF37; --oscuro: #0a0a0a; --rojo: #C8102E; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--oscuro); 
            color: white; 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* TU FOTO CON EL SACO ROJO DE FONDO */
        .bg-main {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)), url('jack.jpeg');
            background-size: cover; background-position: center top;
            z-index: -1;
        }

        .container { width: 100%; max-width: 900px; padding: 40px 20px; text-align: center; }

        /* LOGO OFICIAL */
        .logo-img { width: 140px; margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(212,175,55,0.4)); }

        nav { margin-bottom: 35px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { color: var(--dorado); opacity: 1; }

        h1 { font-family: 'Playfair Display'; font-size: 2.6rem; text-transform: uppercase; margin-bottom: 40px; line-height: 1.2; }
        h1 span { color: var(--dorado); }

        /* PANEL CENTRAL (GLASSMORPHISM) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px;
            padding: 45px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .promo-banner {
            background: linear-gradient(135deg, #b8860b, #ffd700);
            color: black; padding: 14px 40px; border-radius: 50px;
            display: inline-block; font-weight: 800; font-size: 1rem;
            margin-bottom: 35px; cursor: pointer; border: none;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
        .promo-banner:hover { transform: scale(1.05); background: white; }

        /* GRILLA DE CATEGORÍAS */
        .grid-clases {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px; margin-bottom: 50px;
        }

        .clase-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px 15px; border-radius: 25px;
            cursor: pointer; transition: 0.4s;
        }
        .clase-item:hover { background: rgba(255,255,255,0.12); border-color: var(--dorado); transform: translateY(-8px); }
        .clase-item h3 { font-size: 1rem; margin-bottom: 18px; color: var(--dorado); letter-spacing: 1px; }
        .play-icon { width: 45px; height: 45px; background: rgba(212,175,55,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; color: var(--dorado); font-size: 1.2rem; }

        /* FEATURED CLASES (Fotos de las clases grupales) */
        .featured-header { text-align: left; margin-bottom: 20px; font-size: 1.4rem; font-family: 'Playfair Display'; color: var(--dorado); }
        .featured-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .featured-thumb { 
            height: 180px; border-radius: 20px; overflow: hidden; position: relative; 
            border: 1px solid rgba(255,255,255,0.15); cursor: pointer;
        }
        .featured-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .featured-thumb:hover img { transform: scale(1.15); }
