<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jackson Bahía Cia | Academia Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --rojo: #C8102E; --dorado: #D4AF37; --oscuro: #0a0a0a; --crema: #f8f1e7;
            --glass: rgba(20, 20, 20, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--oscuro); color: var(--crema); min-height: 100vh; }

        .bg-dinamico {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.95)),
                        url('https://images.unsplash.com/photo-1547153760-18fc86324498?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center;
        }

        .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display'; font-size: 2.5rem; color: var(--dorado); text-transform: uppercase; }

        /* CARDS */
        .card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .categoria-title { border-left: 4px solid var(--dorado); padding-left: 15px; margin: 30px 0 15px; font-family: 'Playfair Display'; font-size: 1.4rem; }

        .nivel-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px;
        }

        .btn { padding: 12px 18px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .btn-gold { background: var(--dorado); color: black; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: var(--rojo); color: white; }

        /* PANEL ADMIN */
        #adminPanel { background: #1a1a1a; border: 2px solid var(--dorado); padding: 20px; border-radius: 20px; margin-top: 30px; }
        .user-row { border-bottom: 1px solid #333; padding: 10px 0; font-size: 0.8rem; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; margin-right: 5px; background: #444; }

        /* REPRODUCTOR */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { width: 95%; max-width: 900px; }
        .v-cont { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .v-cont iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; }
    </style>
</head>
<body>

    <div class="bg-dinamico"></div>

    <div class="container">
        <header>
            <h1>Jackson Bahía Cia</h1>
            <p id="userNameDisplay" style="color: var(--dorado); font-weight: bold; font-size: 0.9rem;"></p>
        </header>

        <div id="loginBox" class="card" style="text-align: center;">
            <h2 style="margin-bottom: 20px;">Acceso Academy</h2>
            <input type="email" id="email" placeholder="Tu correo electrónico">
            <input type="password" id="pass" placeholder="Tu contraseña">
            <button class="btn btn-gold" style="width: 100%;" onclick="autenticar()">Entrar a Clases</button>
        </div>

        <div id="appBox" class="hidden">
            
            <div class="card" style="background: linear-gradient(135deg, #600010, #000); border: 2px solid var(--dorado);">
                <h2 style="color: var(--dorado)">👑 MEMBRESÍA VIP TOTAL</h2>
                <p style="font-size: 0.8rem; margin: 10px 0;">Acceso a TODO por 30 días.</p>
                <div style="font-size: 1.5rem; font-weight: bold;">$60.000</div>
                <button id="btn-VIP" class="btn btn-gold" onclick="procesarInversion('VIP', 60000, 'LINK_VIP')">Invertir en todo</button>
            </div>

            <div class="categoria-title">Cursos Disponibles</div>
            <div id="mainCatalog"></div>

            <div id="adminArea" class="hidden">
                <div id="adminPanel">
                    <h3 style="color: var(--dorado); margin-bottom: 15px;">Panel de Control Jackson</h3>
                    <div id="userList"></div>
                </div>
            </div>

            <button class="btn btn-red" style="width: 100%; margin-top: 40px;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </div>

    <div id="vModal" class="modal">
        <div class="modal-content">
            <div class="v-cont" id="player"></div>
            <button onclick="cerrarV()" class="btn btn-red" style="width: 100%; border-radius: 0;">CERRAR VIDEO</button>
        </div>
    </div>

    <script>

        const catalog = [

            {id: 'b1', cat: 'Básicos', n: 'Básicos Nivel 1', p: 20000, vid: 'PL1', isPL: true, link: 'Uala_B1'},
            {id: 'p1', cat: 'Pareja', n: 'Pareja Nivel 1', p: 25000, vid: 'PL_P1', isPL: true, link: 'Uala_P1'},
            {id: 's1', cat: 'Shines', n: 'Shines Nivel 1', p: 20000, vid: 'PL_S1', isPL: true, link: 'Uala_S1'}
        ];

            const email = document.getElementById('email').value.toLowerCase().trim();
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Completa los datos");

            let user = JSON.parse(localStorage.getItem(email));
            
            if(!user) {
                user = { email, pass, role: email.includes('admin') ? 'admin' : 'user', access: {} };
                localStorage.setItem(email, JSON.stringify(user));
            }

            if(user.pass !== pass) return alert("Contraseña incorrecta");
            
            loggedUser = user;
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('appBox').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = "BIENVENIDO: " + email;
            
            if(user.role === 'admin') document.getElementById('adminArea').classList.remove('hidden');
            
            limpiarAccesosVencidos();
            renderCatalog();
            if(user.role === 'admin') renderAdmin();
        }
