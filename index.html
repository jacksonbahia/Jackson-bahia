<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jackson Bahía Cia</title>
    <style>
        :root { --dorado: #D4AF37; --oscuro: #0a0a0a; --rojo: #C8102E; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { background-color: var(--oscuro); color: white; min-height: 100vh; }

        /* FONDO: Tu foto del saco rojo */
        .bg-fixed {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('jack.jpeg');
            background-size: cover; background-position: center top;
            z-index: -1;
        }

        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 30px 20px; text-align: center; }

        .logo { width: 130px; margin-bottom: 10px; }

        .vip-card {
            background: var(--rojo); color: white; padding: 25px; border-radius: 20px;
            margin: 20px 0; border: 2px solid var(--dorado); cursor: pointer;
        }

        .cat-title {
            text-align: left; color: var(--dorado); font-size: 1.2rem;
            margin: 35px 0 15px; border-left: 4px solid var(--dorado); padding-left: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .item-clase {
            background: rgba(255,255,255,0.1); padding: 18px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }

        .price { color: var(--dorado); font-weight: bold; font-size: 0.9rem; }

        .btn-entrar {
            background: var(--dorado); color: black; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* GRILLA DE IMÁGENES GRUPALES */
        .grid-fotos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 40px; }
        .foto { height: 160px; border-radius: 15px; overflow: hidden; border: 1px solid var(--dorado); }
        .foto img { width: 100%; height: 100%; object-fit: cover; }

        .footer { margin-top: 50px; padding-bottom: 40px; opacity: 0.9; }
        .social-link { color: var(--dorado); text-decoration: none; font-weight: bold; margin: 0 10px; }

        /* REPRODUCTOR */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { width: 90%; max-width: 800px; aspect-ratio: 16/9; position: relative; }
        .close { position: absolute; top: -35px; right: 0; color: white; cursor: pointer; }
    </style>
</head>
