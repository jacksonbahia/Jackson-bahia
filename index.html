<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jackson Bahía Cia - OPTIMA CONFIG</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <style>
        :root { 
            --dorado: #D4AF37; 
            --rojo: #C8102E; 
            --oscuro: #070707;
            --glass: rgba(255, 255, 255, 0.08);
            --shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--oscuro); color: white; overflow-x: hidden; }

        /* FONDO DINÁMICO CON TU FOTO PRINCIPAL */
        .bg-dinamico {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), url('jack.jpeg');
            background-size: cover; background-position: center top;
            z-index: -2;
            animation: panBg 25s infinite alternate ease-in-out;
        }
        @keyframes panBg { from { transform: scale(1); } to { transform: scale(1.15); } }

        /* EFECTO DE CHISPAS/PARTÍCULAS */
        .sparkles-container { position: relative; display: inline-block; }
        .sparkles-container::before {
            content: ''; position: absolute; inset: -20px;
            background: radial-gradient(circle, var(--dorado) 1px, transparent 1px);
            background-size: 15px 15px; opacity: 0.3;
            animation: moveSparkles 4s linear infinite;
            z-index: -1; pointer-events: none;
        }
        @keyframes moveSparkles { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        .container { max-width: 650px; margin: 0 auto; padding: 50px 20px; text-align: center; }

        /* LOGO DINÁMICO */
        .logo-main { 
            width: 170px; border-radius: 50%;
            filter: drop-shadow(0 0 25px rgba(212,175,55,0.4));
            margin-bottom: 25px;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-main:hover { transform: scale(1.1) rotate(5deg); }

        h1 { font-family: 'Playfair Display'; font-size: 3rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 20px rgba(212,175,55,0.5); }
        .subtitle { color: var(--dorado); font-weight: 800; letter-spacing: 6px; font-size: 0.95rem; margin-top: 10px; text-shadow: 2px 2px 4px black; }

        /* ESTRUCTURA DE MENÚS GLASSMORPHISM */
        .category-label { 
            text-align: left; color: var(--dorado); font-size: 1.2rem; font-weight: 800;
            margin: 45px 0 20px; border-left: 5px solid var(--dorado); padding-left: 15px;
            text-transform: uppercase;
        }

        .item-clase {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 22px 30px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: var(--shadow);
            transition: 0.4s ease;
        }
        .item-clase:hover { transform: translateX(12px); border-color: var(--dorado); background: rgba(255,255,255,0.12); }

        .btn-pago {
            background: var(--dorado); color: black; border: none;
            padding: 12px 25px; border-radius: 12px; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn-pago:hover { background: white; transform: scale(1.1); box-shadow: 0 0 20px var(--dorado); }

        /* GRILLA DE FOTOS GRUPALES */
        .galeria { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 50px; }
        .foto-card { height: 180px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(212,175,55,0.3); box-shadow: var(--shadow); }
        .foto-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .foto-card:hover img { transform: scale(1.1); }

        /* FOOTER REDES */
        .footer { margin-top: 70px; padding-bottom: 50px; }
        .redes { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; }
        .social-btn { text-decoration: none; color: white; transition: 0.4s; text-align: center; }
        .social-btn i { font-size: 2.2rem; display: block; margin-bottom: 5px; }
        .fa-instagram:hover { color: #E1306C; transform: translateY(-5px); }
        .fa-whatsapp:hover { color: #25D366; transform: translateY(-5px); }
        .redes span { font-size: 0.7rem; font-weight: 800; color: var(--dorado); text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="bg-dinamico"></div>

    <div class="container">
        <header>
            <img src="LOGO Jackson Bahia oficial.jpg" class="logo-main" alt="Logo">
            <div class="sparkles-container">
                <h1>Jackson Bahía Cia</h1>
            </div>
            <p class="subtitle">CLASES DE BACHATA ONLINE</p>
        </header>

        <div class="category-label">Bachata Básicos</div>
        <div class="item-clase"><p>Nivel 1 al 4</p><button class="btn-pago">Pay Now</button></div>

        <div class="category-label">Bachata en Pareja</div>
        <div class="item-clase"><p>Nivel 1 al 4</p><button class="btn-pago">Pay Now</button></div>

        <div class="category-label">Teoría y Musicalidad</div>
        <div class="item-clase"><p>Módulo Completo</p><button class="btn-pago">Pay Now</button></div>

        <div class="category-label">Bachata Shines</div>
        <div class="item-clase"><p>Pasos Sueltos 1 al 4</p><button class="btn-pago">Pay Now</button></div>

        <div class="galeria">
            <div class="foto-card"><img src="WhatsApp Image 2026-04-26 at 7.45.25 PM.jpeg"></div>
            <div class="foto-card"><img src="IMG_20141012_162154_869.jpg"></div>
        </div>

        <footer class="footer">
            <div class="redes">
                <a href="https://instagram.com/jacksonbahiaok" target="_blank" class="social-btn">
                    <i class="fab fa-instagram"></i><span>Instagram</span>
                </a>
                <a href="https://wa.me/542914220136" target="_blank" class="social-btn">
                    <i class="fab fa-whatsapp"></i><span>WhatsApp</span>
                </a>
            </div>
            <p style="font-size: 0.7rem; opacity: 0.4;">© 2026 JACKSON BAHÍA CIA - OPTIMA CONFIG</p>
        </footer>
    </div>

</body>
</html>
