        :root {

            --sombra-fuerte: 0 15px 35px rgba(0,0,0,0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--oscuro); color: white; overflow-x: hidden; }

        /* FONDO ESCÉNICO */
        .escenario-bg {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), url('jack.jpeg');
            background-size: cover; background-position: center top;
            z-index: -1;
        }

        .container { max-width: 650px; margin: 0 auto; padding: 40px 20px; }

        /* IDENTIDAD VISUAL */
        .header-section { margin-bottom: 40px; text-align: center; }
        .logo-main { 
            width: 160px; 
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.4));
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
        }
        .logo-main:hover { transform: scale(1.1) rotate(5deg); }

        h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 4px 10px black; }
        .sub-titulo { color: var(--dorado); font-weight: bold; letter-spacing: 5px; font-size: 0.9rem; margin-top: 5px; }

        /* ACCESO VIP: EL DESTACADO PROFESIONAL */
        .vip-premium {
            background: linear-gradient(135deg, var(--rojo) 0%, #700 100%);
            padding: 30px; border-radius: 25px; border: 1px solid var(--dorado);
            box-shadow: var(--sombra-fuerte); margin-bottom: 40px;
            cursor: pointer; transition: 0.4s; position: relative; overflow: hidden;
        }
        .vip-premium:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(212,175,55,0.2); }

        /* MENÚS INTERACTIVOS */
        .cat-label { 
            text-align: left; color: var(--dorado); font-size: 1.1rem; font-weight: bold;
            margin: 40px 0 15px; border-left: 4px solid var(--dorado); padding-left: 15px;
            text-transform: uppercase;
        }

        .clase-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: var(--sombra-fuerte);
            transition: all 0.4s ease;
        }
        .clase-card:hover { 
            background: rgba(255,255,255,0.15);
            transform: translateX(12px);
            border-color: var(--dorado);
        }

        .info-clase { text-align: left; }
        .info-clase h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .info-clase .precio { color: var(--dorado); font-weight: bold; font-size: 0.9rem; }

        .btn-play {
            background: var(--dorado); color: black; border: none;
            padding: 12px 25px; border-radius: 10px; font-weight: 800;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-play:hover { background: white; transform: scale(1.05); }

        /* GALERÍA PROFESIONAL */
        .galeria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 40px; }
        .galeria-item { 
            height: 180px; border-radius: 18px; overflow: hidden; 
            border: 1px solid rgba(212,175,55,0.3); box-shadow: var(--sombra-fuerte);
        }
        .galeria-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .galeria-item:hover img { transform: scale(1.1); }

        /* FOOTER DINÁMICO */
        .footer-social { margin-top: 60px; padding-bottom: 40px; }
        .social-link {
            display: inline-block; padding: 12px 30px; border-radius: 50px;
            text-decoration: none; font-weight: bold; margin: 10px;
            transition: 0.3s; border: 1px solid var(--dorado);
        }
        .insta { background: transparent; color: white; }
        .insta:hover { background: var(--dorado); color: black; }

        /* REPRODUCTOR PROFESIONAL */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            display: none; align-items: center; justify-content: center; z-index: 1000; 
        }
        .modal-content { width: 90%; max-width: 850px; aspect-ratio: 16/9; position: relative; }
    </style>
</head>
