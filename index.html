<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jackson Bahia Cia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body{
margin:0;
font-family:Poppins;
color:white;
background:
linear-gradient(rgba(10,10,15,0.85), rgba(10,10,15,0.95)),
url('https://images.unsplash.com/photo-1514512364185-4c2bff2d8c52?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.dance-bg{
position:fixed;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1504609813442-a8924e83f76e?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
opacity:0.08;
z-index:-1;
animation:zoom 20s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* LOGO */
.logo{
position:fixed;
top:20px;
left:20px;
font-size:32px;
font-weight:900;
background:linear-gradient(45deg,#ff00cc,#3333ff);
-webkit-background-clip:text;
color:transparent;
z-index:1000;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:80px;
font-weight:900;
background:linear-gradient(45deg,#ff00cc,#3333ff);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 20px #ff00cc;}
to{text-shadow:0 0 50px #3333ff;}
}

.hero h2{
font-size:30px;
font-weight:600;
opacity:0.9;
margin-bottom:20px;
}

/* LOGIN */
#loginBox{
display:block;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

/* CURSOS */
.section{
padding:60px 20px;
max-width:900px;
margin:auto;
}

.curso{
margin-bottom:40px;
}

.nivel{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
padding:12px;
margin:6px 0;
border-radius:10px;
}

.btn{
background:linear-gradient(45deg,#ff00cc,#3333ff);
border:none;
padding:8px 15px;
color:white;
border-radius:20px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#111;
padding:30px;
max-width:400px;
border-radius:10px;
text-align:center;
}

/* ADMIN */
#adminPanel{
display:none;
background:#111;
padding:20px;
margin:20px;
}
</style>
</head>

<body>

<div class="logo">JB</div>
<div class="dance-bg"></div>
<div id="particles-js"></div>

<div class="hero">
<h1>JACKSON BAHIA CIA</h1>
<h2>Clases de bachata online para todo público</h2>

<div id="loginBox">
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button class="btn" onclick="login()">Ingresar</button>
</div>

</div>

<div class="section">

<div class="curso">
<h2>BACHATA PASOS BÁSICOS</h2>

<div class="nivel">Nivel 1 <button class="btn" onclick="invertir()">Invertir</button></div>
<div class="nivel">Nivel 2 <button class="btn" onclick="invertir()">Invertir</button></div>
<div class="nivel">Nivel 3 <button class="btn" onclick="invertir()">Invertir</button></div>
<div class="nivel">Nivel 4 <button class="btn" onclick="invertir()">Invertir</button></div>

<div class="nivel">Membresía Completa $20.000 
<button class="btn" onclick="invertir()">Invertir</button></div>
</div>

</div>

<!-- MODAL DE PAGO -->
<div id="modal" class="modal">
<div class="modal-content">
<h3>Panel de Pago</h3>
<p>
<b>Titular:</b> PIMENTEL DIEGO ANTONIO<br>
<b>Alias:</b> JACKSON.BAHIA<br><br>
Enviar comprobante a:<br>
<b>2914220136</b>
</p>
<button class="btn" onclick="cerrar()">Cerrar</button>
</div>
</div>

<div id="adminPanel">
<h2>Panel Admin</h2>
<ul id="lista"></ul>
</div>

<script>

// LOGIN
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin@jackson.com" && p==="2828"){
localStorage.setItem("admin","true");
mostrarAdmin();
}else{
localStorage.setItem("usuario",u);
}

// OCULTA LOGIN
document.getElementById("loginBox").style.display="none";
}

// INVERTIR (ARREGLADO)
function invertir(){
let user=localStorage.getItem("usuario") || localStorage.getItem("admin");

if(!user){
alert("Debes iniciar sesión primero");
return;
}

document.getElementById("modal").style.display="flex";
}

// CERRAR MODAL
function cerrar(){
document.getElementById("modal").style.display="none";
}

// ADMIN
function mostrarAdmin(){
document.getElementById("adminPanel").style.display="block";
}

particlesJS("particles-js",{
particles:{number:{value:60},size:{value:3},move:{speed:2}}
});
</script>

</body>
</html>
