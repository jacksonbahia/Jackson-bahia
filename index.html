<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackson Bahía Cia | Academia Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --dorado: #D4AF37; --rojo: #C8102E; --oscuro: #050505; --glass: rgba(255, 255, 255, 0.07); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--oscuro); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('jack.jpeg'); background-size: cover; background-position: center top; }

        .container { max-width: 1000px; margin: 0 auto; padding: 100px 20px; text-align: center; }
        
        .hero-logo { width: 150px; border-radius: 50%; border: 2px solid var(--dorado); box-shadow: 0 0 30px rgba(212,175,55,0.4); margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display'; font-size: 3.5rem; text-transform: uppercase; color: var(--dorado); margin-bottom: 5px; }
        .subtitle { letter-spacing: 5px; font-weight: 800; font-size: 0.9rem; margin-bottom: 50px; opacity: 0.8; }

        .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .card h3 { color: var(--dorado); margin-bottom: 20px; border-bottom: 1px solid var(--dorado); padding-bottom: 10px; }

        .level-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .btn-pay { background: var(--dorado); color: black; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }
        .btn-pay:hover { background: white; transform: scale(1.05); }
        .btn-active { background: #2ecc71; color: white; }
        .btn-expired { background: var(--rojo); color: white; }

        .days-left { display: block; font-size: 0.6rem; margin-top: 4px; color: #2ecc71; text-align: center; }

        /* MODAL VIDEO */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { width: 90%; max-width: 800px; aspect-ratio: 16/9; position: relative; }
        .close-modal { position: absolute; top: -40px; right: 0; color: white; cursor: pointer; font-weight: bold; }

        footer { margin-top: 100px; padding: 50px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <img src="LOGO Jackson Bahia oficial.jpg" class="hero-logo">
        <h1>Jackson Bahía Cia</h1>
        <p class="subtitle">CLASES DE BACHATA ONLINE</p>

        <div class="course-grid">
            <div class="card">
                <h3>Bachata Básicos</h3>
                <div class="level-row">
                    <div>
                        <span>Nivel 1</span>
                        <div id="status-b1"></div>
                    </div>
                    <div id="action-b1">
                        <button class="btn-pay" onclick="procesarPago('b1', 'https://youtu.be/8Ne_yfRQfEA')">Pagar</button>
                    </div>
                </div>
                </div>
        </div>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarVideo()">CERRAR [X]</span>
            <div id="player" style="width:100%; height:100%;"></div>
        </div>
    </div>

    <script>
        // 1. Lógica de Control de Tiempo (30 días = 2592000000 milisegundos)
        const DURACION_ACCESO = 30 * 24 * 60 * 60 * 1000; 

        function procesarPago(id, link) {
            // Simulación de pago exitoso
            const ahora = new Date().getTime();
            const compra = {
                fechaCompra: ahora,
                videoUrl: link
            };
            localStorage.setItem('compra_' + id, JSON.stringify(compra));
            alert("¡Pago exitoso! Tienes 30 días de acceso a partir de ahora.");
            verificarAccesos();
        }

        function verificarAccesos() {
            const id = 'b1'; // Ejemplo para Nivel 1
            const data = localStorage.getItem('compra_' + id);
            const statusDiv = document.getElementById('status-' + id);
            const actionDiv = document.getElementById('action-' + id);

            if (data) {
                const compra = JSON.parse(data);
                const ahora = new Date().getTime();
                const transcurrido = ahora - compra.fechaCompra;

                if (transcurrido < DURACION_ACCESO) {
                    // ACCESO ACTIVO
                    const diasRestantes = Math.ceil((DURACION_ACCESO - transcurrido) / (1000 * 60 * 60 * 24));
                    statusDiv.innerHTML = `<span class="days-left">Quedan ${diasRestantes} días</span>`;
                    actionDiv.innerHTML = `<button class="btn-pay btn-active" onclick="verVideo('${compra.videoUrl}')">VER CLASE</button>`;
                } else {
                    // ACCESO CADUCADO
                    statusDiv.innerHTML = `<span class="days-left" style="color:red">Acceso Caducado</span>`;
                    actionDiv.innerHTML = `<button class="btn-pay btn-expired" onclick="procesarPago('${id}', '${compra.videoUrl}')">RENOVAR</button>`;
                }
            }
        }
