<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jackson Bahía Cia | Academia de Bachata</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root { --rojo: #C8102E; --dorado: #D4AF37; --oscuro: #0a0a0a; --crema: #f8f1e7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background-color: var(--oscuro); color: var(--crema); line-height: 1.6; overflow-x: hidden; }

        /* FONDO TRASLÚCIDO MEJORADO */
        .bg-dinamico {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(rgba(10, 10, 10, 0.6), rgba(10, 10, 10, 0.9)),
                        url('jack.jpeg'); 
            background-size: cover; 
            background-position: center top;
            background-attachment: fixed;
        }

        .container { max-width: 650px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; }
        
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Playfair Display'; font-size: 2.8rem; color: var(--dorado); text-transform: uppercase; letter-spacing: 2px; text-shadow: 3px 3px 15px rgba(0,0,0,0.8); }

        /* VIP BANNER - 30 DÍAS */
        .vip-banner {
            background: linear-gradient(135deg, rgba(200, 16, 46, 0.85), rgba(0,0,0,0.9));
            padding: 35px; border-radius: 25px; border: 2px solid var(--dorado); 
            text-align: center; margin-bottom: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        .vip-banner h2 { font-family: 'Playfair Display'; margin-bottom: 5px; font-size: 1.8rem; color: #fff; }
        .vip-banner .precio-vip { font-size: 2.8rem; font-weight: 800; margin: 10px 0; color: var(--dorado); }
        .vip-banner p { font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        .categoria-header { 
            background: rgba(212, 175, 55, 0.2); padding: 12px 20px; 
            border-left: 6px solid var(--dorado); margin: 45px 0 20px;
            font-family: 'Playfair Display'; font-size: 1.6rem; color: var(--dorado);
            text-transform: uppercase; backdrop-filter: blur(5px);
        }

        .nivel-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 15, 15, 0.85); padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s ease; backdrop-filter: blur(12px);
        }
        .nivel-row:hover { border-color: var(--dorado); transform: scale(1.02); }

        .btn { padding: 14px 24px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; }
        .btn-gold { background: var(--dorado); color: black; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        .btn-red { background: var(--rojo); color: white; }

        /* FOOTER CON FOTO GRUPAL */
        .footer-social { 
            margin-top: 60px; text-align: center; padding: 50px 20px; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('grupal.jpeg');
            background-size: cover; background-position: center;
            border-radius: 25px; border: 1px solid var(--dorado);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .social-links a { 
            color: white; text-decoration: none; font-weight: bold; 
            padding: 14px 28px; border: 2px solid var(--dorado); border-radius: 50px; 
            font-size: 0.9rem; transition: 0.3s; background: rgba(0,0,0,0.8);
        }
        .social-links a:hover { background: var(--dorado); color: black; box-shadow: 0 0 20px var(--dorado); }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { width: 95%; max-width: 900px; }
        .v-cont { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid var(--dorado); }
        .v-cont iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="bg-dinamico"></div>

    <div class="container">
        <header>
            <p style="letter-spacing: 6px; font-size: 0.75rem; color: var(--dorado); font-weight: bold; margin-bottom: 10px;">ESTUDIO DE BAILE PROFESIONAL</p>
            <h1>Jackson Bahía Cia</h1>
        </header>

        <div class="vip-banner">
            <h2>👑 MEMBRESÍA VIP ELITE</h2>
            <p>Acceso a TODO el contenido por 30 días</p>
            <div class="precio-vip">$60.000</div>
            <button class="btn btn-gold" onclick="abrirPago('VIP', 'https://link.uala.com.ar/JACKSON_VIP')">OBTENER ACCESO 30 DÍAS</button>
        </div>

        <div id="app-catalog"></div>

        <div class="footer-social">
            <h3 style="font-family: 'Playfair Display'; color: var(--dorado); font-size: 1.8rem;">Sumate a la Familia</h3>
            <p style="font-size: 1rem; opacity: 0.9;">Consultas por WhatsApp e Instagram</p>
            <div class="social-links">
                <a href="https://wa.me/542914220136" target="_blank">WhatsApp</a>
                <a href="https://instagram.com/jacksonbahiaok" target="_blank">Instagram</a>
            </div>
            <p style="margin-top: 35px; font-size: 0.75rem; opacity: 0.6;">© 2026 JACKSON BAHÍA CIA. BAHÍA BLANCA, ARGENTINA.</p>
        </div>
    </div>

    <div id="vModal" class="modal">
        <div class="modal-content">
            <div class="v-cont" id="player"></div>
            <button onclick="cerrarV()" class="btn btn-red" style="width:100%; border-radius:0; padding: 20px; font-size: 1rem;">VOLVER AL MENÚ</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE CURSOS (Acceso 30 días)
        const cursos = [
            { id: 'mus', cat: 'TEORÍA', n: 'Musicalidad Aplicada', p: '20.000', vid: 'ID_VIDEO', pl: false, link: 'https://link.uala.com.ar/mus' },
            { id: 'b1', cat: 'INDIVIDUAL', n: 'Básicos Nivel 1', p: '20.000', vid: 'ID_PL', pl: true, link: 'https://link.uala.com.ar/b1' },
            { id: 'p1', cat: 'PAREJA', n: 'Pareja Nivel 1', p: '25.000', vid: 'ID_PL', pl: true, link: 'https://link.uala.com.ar/p1' },
            { id: 's1', cat: 'SHINES', n: 'Shines Nivel 1', p: '20.000', vid: 'ID_PL', pl: true, link: 'https://link.uala.com.ar/s1' }
        ];

        const TIEMPO_ACCESO = 30 * 24 * 60 * 60 * 1000; // 30 días en milisegundos

        // Cargar accesos guardados con fecha
        let accesosData = JSON.parse(localStorage.getItem('jbc_data')) || {};

        function render() {
            const cont = document.getElementById('app-catalog');
            cont.innerHTML = '';
            let currentCat = '';
            const ahora = Date.now();

            cursos.forEach(c => {
                if(c.cat !== currentCat) {
                    cont.innerHTML += `<div class="categoria-header">${c.cat}</div>`;
                    currentCat = c.cat;
                }
                
                // Verificar si tiene acceso individual o VIP y si no venció
                const fechaPago = accesosData[c.id] || accesosData['VIP'];
                const activo = fechaPago && (ahora - fechaPago < TIEMPO_ACCESO);
                
                let diasRestantes = 0;
                if(activo) {
                    diasRestantes = Math.ceil((TIEMPO_ACCESO - (ahora - fechaPago)) / (1000 * 60 * 60 * 24));
                }

                cont.innerHTML += `
                    <div class="nivel-row">
                        <div style="text-align: left;">
                            <h3 style="font-size: 1.1rem; margin-bottom: 2px;">${c.n}</h3>
                            <span style="font-size: 0.85rem; color: ${activo ? '#2ecc71' : '#ccc'}">
                                ${activo ? `ACTIVO (Faltan ${diasRestantes} días)` : '$' + c.p}
                            </span>
                        </div>
                        <button class="btn ${activo ? 'btn-red' : 'btn-gold'}" 
                                onclick="${activo ? `ver('${c.vid}', ${c.pl})` : `abrirPago('${c.id}', '${c.link}')`}">
                            ${activo ? 'VER CLASE' : 'COMPRAR'}
                        </button>
                    </div>`;
            });
        }

        function abrirPago(id, link) {
            if(confirm("Se abrirá el link de pago por 30 días de acceso.")) {
                window.open(link, '_blank');
                // Guardar fecha de compra actual
                accesosData[id] = Date.now();
                localStorage.setItem('jbc_data', JSON.stringify(accesosData));
                render();
            }
        }

        function ver(id, esLista) {
            const url = esLista ? `https://www.youtube.com/embed?listType=playlist&list=${id}&autoplay=1` : `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('player').innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>`;
            document.getElementById('vModal').style.display = 'flex';
        }

        function cerrarV() { document.getElementById('vModal').style.display = 'none'; document.getElementById('player').innerHTML = ''; }

        render();
    </script>
</body>
</html>
