<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root { --dorado: #D4AF37; --oscuro: #0a0a0a; --rojo: #C8102E; --sombra: rgba(0, 0, 0, 0.8); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background-color: var(--oscuro); color: white; min-height: 100vh; overflow-x: hidden; }

        /* FONDO DINÁMICO */
        .bg-fixed {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), url('jack.jpeg');
            background-size: cover; background-position: center top;
            z-index: -1; transform: scale(1.05);
        }

        .container { width: 100%; max-width: 700px; margin: 0 auto; padding: 40px 20px; text-align: center; }

        /* LOGO CON SOMBRA Y DINÁMICA */
        .logo { 
            width: 160px; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.9)); 
            margin-bottom: 20px;
            transition: transform 0.5s ease;
        }
        .logo:hover { transform: rotate(5deg) scale(1.1); }

        /* TÍTULOS */
        h1 { font-family: 'Playfair Display'; font-size: 2.8rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 4px 4px 15px var(--sombra); }
        .sub-titulo { font-size: 1.1rem; color: var(--dorado); letter-spacing: 5px; font-weight: bold; margin-bottom: 40px; text-shadow: 2px 2px 5px black; }

        /* CARD VIP INTERACTIVA */
        .vip-card {
            background: linear-gradient(135deg, var(--rojo), #600);
            padding: 30px; border-radius: 25px;
            border: 2px solid var(--dorado);
            box-shadow: 0 20px 40px var(--sombra);
            cursor: pointer; transition: all 0.4s ease;
            margin-bottom: 40px; position: relative; overflow: hidden;
        }
        .vip-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 30px 60px rgba(212,175,55,0.3); }

        /* MENÚ DE CLASES CON DINÁMICA */
        .cat-title {
            text-align: left; color: var(--dorado); font-size: 1.3rem; font-family: 'Playfair Display';
            margin: 40px 0 20px; border-left: 5px solid var(--dorado); padding-left: 15px;
        }

        .item-clase {
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px var(--sombra);
        }
        .item-clase:hover { 
            background: rgba(255,255,255,0.15); 
            border-color: var(--dorado); 
            transform: translateX(10px); 
        }

        .price { color: var(--dorado); font-weight: bold; display: block; font-size: 0.9rem; }

        .btn-entrar {
            background: var(--dorado); color: black; border: none;
            padding: 12px 25px; border-radius: 10px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .btn-entrar:hover { background: white; transform: scale(1.1); }

        /* GRILLA DE FOTOS GRUPALES */
        .grid-fotos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 50px; }
        .foto { 
            height: 200px; border-radius: 20px; overflow: hidden; 
            border: 2px solid rgba(212,175,55,0.3);
            box-shadow: 0 15px 30px var(--sombra);
            transition: 0.5s;
        }
        .foto:hover { transform: scale(1.05) rotate(2deg); border-color: var(--dorado); }
        .foto img { width: 100%; height: 100%; object-fit: cover; }

        .footer { margin-top: 60px; padding: 40px 0; border-top: 1px solid rgba(212,175,55,0.2); }
        .social-btn { 
            display: inline-block; text-decoration: none; color: white; 
            background: rgba(255,255,255,0.1); padding: 12px 25px; border-radius: 50px;
            margin: 10px; border: 1px solid var(--dorado); transition: 0.3s;
        }
        .social-btn:hover { background: var(--dorado); color: black; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { width: 90%; max-width: 850px; aspect-ratio: 16/9; position: relative; box-shadow: 0 0 50px var(--dorado); border-radius: 20px; overflow: hidden; }
        .close { position: absolute; top: -45px; right: 0; color: white; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
