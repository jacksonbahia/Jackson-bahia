<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackson Bahia Cia</title>

<!-- SEO -->
<meta name="description" content="Clases de bachata online - Jackson Bahia Cia">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- Particles -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0a0a0f;color:white;overflow-x:hidden;}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
padding:15px 40px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff00cc;}
to{text-shadow:0 0 30px #3333ff;}
}

.btn{
padding:12px 25px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
border:none;
color:white;
cursor:pointer;
border-radius:30px;
transition:0.3s;
margin-top:20px;
}

.btn:hover{
transform:scale(1.1);
}

/* SECTIONS */
.section{
padding:100px 20px;
max-width:1100px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:30px;
border-radius:10px;
text-align:center;
}

/* FOOTER */
footer{
text-align:center;
padding:40px;
background:#111;
}

footer a{
margin:10px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<nav>
<div>Jackson Bahia</div>
<div>
<a href="#cursos">Cursos</a>
<a href="#videos">Videos</a>
<a href="#login">Login</a>
</div>
</nav>

<section class="hero">
<h1>Jackson Bahia Cia</h1>
<p>CLASES DE BACHATA ONLINE</p>
<button class="btn" onclick="scrollToCursos()">Ver Clases</button>
</section>

<section id="cursos" class="section">
<h2>Cursos</h2>

<div class="cards">

<div class="card">
<h3>Básicos</h3>
<button class="btn" onclick="comprar('Basico 1')">Nivel 1</button>
<button class="btn" onclick="comprar('Basico 2')">Nivel 2</button>
<button class="btn" onclick="comprar('Basico 3')">Nivel 3</button>
<button class="btn" onclick="comprar('Basico 4')">Nivel 4</button>
</div>

<div class="card">
<h3>Pareja</h3>
<button class="btn" onclick="comprar('Pareja 1')">Nivel 1</button>
<button class="btn" onclick="comprar('Pareja 2')">Nivel 2</button>
<button class="btn" onclick="comprar('Pareja 3')">Nivel 3</button>
<button class="btn" onclick="comprar('Pareja 4')">Nivel 4</button>
</div>

<div class="card">
<h3>Shines</h3>
<button class="btn" onclick="comprar('Shine 1')">Nivel 1</button>
<button class="btn" onclick="comprar('Shine 2')">Nivel 2</button>
<button class="btn" onclick="comprar('Shine 3')">Nivel 3</button>
<button class="btn" onclick="comprar('Shine 4')">Nivel 4</button>
</div>

<div class="card">
<h3>Musicalidad</h3>
<button class="btn" onclick="comprar('Musicalidad')">Comprar</button>
</div>

</div>
</section>

<section id="videos" class="section">
<h2>Mis Cursos</h2>
<ul id="misCursos"></ul>
</section>

<section id="login" class="section">
<h2>Login</h2>
<input type="text" id="user" placeholder="Usuario"><br><br>
<input type="password" id="pass" placeholder="Contraseña"><br><br>
<button class="btn" onclick="login()">Entrar</button>
</section>

<div id="modal" class="modal">
<div class="modal-content">
<h2>Compra realizada</h2>
<button class="btn" onclick="cerrarModal()">Cerrar</button>
</div>
</div>

<footer>
<p>Redes:</p>
<a href="#">Instagram</a>
<a href="#">Facebook</a>
<a href="#">YouTube</a>
<a href="#">WhatsApp</a>
</footer>

<script>
// SCROLL
function scrollToCursos(){
document.getElementById("cursos").scrollIntoView({behavior:'smooth'});
}

// LOGIN
function login(){
let user=document.getElementById("user").value;
localStorage.setItem("user",user);
alert("Bienvenido "+user);
}

// COMPRAR
function comprar(curso){
let cursos=JSON.parse(localStorage.getItem("cursos")||"[]");
cursos.push(curso);
localStorage.setItem("cursos",JSON.stringify(cursos));
document.getElementById("modal").style.display="flex";
mostrarCursos();
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}

function mostrarCursos(){
let lista=document.getElementById("misCursos");
lista.innerHTML="";
let cursos=JSON.parse(localStorage.getItem("cursos")||"[]");
cursos.forEach(c=>{
let li=document.createElement("li");
li.textContent=c;
lista.appendChild(li);
});
}

mostrarCursos();

// PARTICLES
particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
});
</script>

</body>
</html>
