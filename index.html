<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jackson Bahía Cia | Academia de Bachata</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root { --dorado: #D4AF37; --oscuro: #0a0a0a; --rojo: #C8102E; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--oscuro); 
            color: white; 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* FONDO PRINCIPAL (Tu foto del saco rojo) */
        .bg-main {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('jack.jpeg');
            background-size: cover; background-position: center;
            z-index: -1;
        }

        .container { width: 100%; max-width: 900px; padding: 20px; text-align: center; }

        /* LOGO */
        .logo-img { width: 120px; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.5)); }

        nav { margin-bottom: 30px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { color: var(--dorado); opacity: 1; }

        h1 { font-family: 'Playfair Display'; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 40px; }
        h1 span { color: var(--dorado); }

        /* PANEL CENTRAL (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .promo-banner {
            background: linear-gradient(90deg, #b8860b, #ffd700);
            color: black; padding: 10px 30px; border-radius: 50px;
            display: inline-block; font-weight: 800; font-size: 0.9rem;
            margin-bottom: 30px; cursor: pointer; border: none;
        }

        /* GRILLA DE CLASES (Igual a tu imagen) */
        .grid-clases {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .clase-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px 15px; border-radius: 20px;
            cursor: pointer; transition: 0.3s;
        }
        .clase-item:hover { background: rgba(255,255,255,0.1); border-color: var(--dorado); transform: translateY(-5px); }
        .clase-item h3 { font-size: 1rem; margin-bottom: 15px; color: var(--dorado); }
        .play-icon { width: 40px; height: 40px; background: rgba(212,175,55,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; color: var(--dorado); }

        /* FEATURED CLASES (Fotos grupales) */
        .featured-header { text-align: left; margin-bottom: 15px; font-size: 1.2rem; font-family: 'Playfair Display'; }
        .featured-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .featured-thumb { 
            height: 150px; border-radius: 15px; overflow: hidden; position: relative; 
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }
        .featured-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .featured-thumb:hover img { transform: scale(1.1); }
        .thumb-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }

        /* MODAL VIDEO */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { width: 90%; max-width: 800px; aspect-ratio: 16/9; position: relative; }
        .close { position: absolute; top: -40px; right: 0; color: white; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) {
            .grid-clases { grid-template-columns: 1fr 1fr; }
            .featured-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-main"></div>

    <div class="container">
        <img src="logo.jpg" class="logo-img" alt="Jackson Bahia Logo">
        
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Sobre Nosotros</a>
            <a href="#">Clases</a>
            <a href="#">Eventos</a>
            <a href="#">Contacto</a>
        </nav>

        <h1>Bienvenidos a la academia de bachata de <span>Jackson Bahía</span></h1>

        <div class="glass-panel">
            <button class="promo-banner" onclick="abrirPago()">INSCRÍBETE AHORA - PASE VIP DE 30 DÍAS</button>

            <div class="grid-clases">
                <div class="clase-item" onclick="ver('ID_MUSICALIDAD')">
                    <h3>Musicalidad</h3>
                    <div class="play-icon">▶</div>
                </div>
                <div class="clase-item" onclick="ver('ID_BASICOS')">
                    <h3>Básicos Nivel 1</h3>
                    <div class="play-icon">▶</div>
                </div>
                <div class="clase-item" onclick="ver('ID_PAREJA')">
                    <h3>Pareja Nivel 1</h3>
                    <div class="play-icon">▶</div>
                </div>
